version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: konn3ct-dashboard
    restart: always
    environment:
      - DASHBOARD_SECRET_KEY=flowboyz-secret-token-key-9999
      - DASHBOARD_SECRET_PORT=8000
    volumes:
      - ../konn3ct.db:/app/konn3ct.db
      - ../sessions:/app/sessions
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    container_name: konn3ct-nginx
    restart: always
    ports:
      - "6000:6000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Self-signed or Let's Encrypt certificates path mapped from host system
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
