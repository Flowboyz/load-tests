- tapOn: "Enter your MDA"
- inputText: "konnectsandbox"
- tapOn: "Your@email.com"
- inputText: "odejinmisa@newwavesecosystem.com"
- tapOn: "Enter your password"
- inputText: "827xazLF6TBfD7N!"
- hideKeyboard
- tapOn: "Login"
- evalScript: "java.lang.Thread.sleep(8000)"
# Navigate to Events via More menu
- tapOn: "More"
- tapOn: "Events"
- assertVisible: "Manage pre-registered events & participants"
# Conditionally check participants only if the event exists
- runFlow:
    when:
      visible: "Maestro Tech Summit"
