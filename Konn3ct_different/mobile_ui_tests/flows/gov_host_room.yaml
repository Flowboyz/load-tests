appId: com.konn3ct.mobile
---
- launchApp
- tapOn:
    id: "mda-input"
- inputText: "konnectsandbox"
- tapOn:
    id: "email-input"
- inputText: "odejinmisa@newwavesecosystem.com"
- tapOn:
    id: "password-input"
- inputText: "827xazLF6TBfD7N!"
- tapOn:
    id: "login-button"
- evalScript: "java.lang.Thread.sleep(5000)"
# Wait for Dashboard to load
- assertVisible: "Instant Meeting"
# Tap the native Host button
- tapOn: "Host"
