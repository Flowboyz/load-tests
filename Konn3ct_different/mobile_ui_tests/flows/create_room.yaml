appId: com.konn3ct.mobile
---
- launchApp
- tapOn: "Demo@email.com"
- inputText: "flowboyzamy@gmail.com"
- tapOn: "Enter your password"
- inputText: "Samedo3333@"
- tapOn: "Login"
- tapOn: "Rooms"
- assertVisible: "Create and manage your meeting rooms."
# Open the Create Modal
- tapOn: "Create Room"
# Wait for Modal to fully load
- assertVisible: "Create New Room"
# Input Room Name
- tapOn: "e.g. Marketing Weekly Sync"
- inputText: "Maestro Auto Room"
# Submit the form (specifically the Create Room button below Private Room)
- tapOn:
    text: "Create Room"
    below: "Private Room"
# Verify Success
- assertVisible: "Maestro Auto Room"
