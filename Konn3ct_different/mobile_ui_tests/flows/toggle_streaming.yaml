appId: com.konn3ct.mobile
---
- launchApp
- tapOn: "Demo@email.com"
- inputText: "flowboyzamy@gmail.com"
- tapOn: "Enter your password"
- inputText: "Samedo3333@"
- tapOn: "Login"
- tapOn: "More"
- tapOn: "Streaming"
- assertVisible: "Live Streams"
# Open the streaming configuration modal
- tapOn: "Start Stream"
# Wait for the modal to load
- assertVisible: "Start New Stream"
# Enter YouTube Stream Key
- tapOn: "Enter YouTube Key"
- inputText: "test-stream-key-12345"
# Hide keyboard so the start button is not covered
- hideKeyboard
# Start Broadcasting
- tapOn: "Start Broadcasting"
# Wait and verify that Stop Streaming button appears
- assertVisible: "Stop Streaming"
# Stop Streaming
- tapOn: "Stop Streaming"
