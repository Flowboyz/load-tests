appId: com.konn3ct.mobile
---
- launchApp
- tapOn: "Demo@email.com"
- inputText: "flowboyzamy@gmail.com"
- tapOn: "Enter your password"
- inputText: "Samedo3333@"
- tapOn: "Login"
- tapOn: "Join"
- tapOn: "e.g. general-meeting"
- inputText: "1govtest"
- tapOn: "Join Room"
# Wait for the meeting room to connect and show the "Live" pill
- extendedWaitUntil:
    visible: "Live"
    timeout: 30000
# Open More Options (4th button on bottom toolbar)
- tapOn: { point: "63%,95%" }
# Raise Hand
- tapOn: "Raise Hand"
# Open More Options again
- tapOn: { point: "63%,95%" }
# Open Chat
- tapOn: "Chat"
# Send Chat message
- tapOn: "Type a message..."
- inputText: "Hello from the mobile automation bot! 🚀"
- pressKey: Enter
# Close Chat
- tapOn: "✕"
# Sleep for 5 minutes
- evalScript: "java.lang.Thread.sleep(300000)"
