{% extends "base.html" %}

{% block title %}Login - Flowboyz FastAPI Load Testing{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div class="logo">
                <i class="fa-solid fa-square-poll-vertical"></i>
            </div>
            <h1>Flowboyz <span style="font-size: 14px; font-weight: 600; color: var(--cyan); letter-spacing: 0.5px; text-transform: uppercase; background: rgba(6, 182, 212, 0.15); padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 4px;">FastAPI</span></h1>
            <p>Load Testing Enterprise Dashboard</p>
        </div>
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <div id="loginError" class="login-error hidden">
                <i class="fa-solid fa-circle-exclamation"></i> Invalid credentials. Please try again.
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <span>Sign In</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('loginError');
    
    errorDiv.classList.add('hidden');
    
    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        if (response.ok) {
            window.location.href = '/';
        } else {
            errorDiv.textContent = data.message || 'Login failed!';
            errorDiv.classList.remove('hidden');
        }
    } catch (err) {
        errorDiv.textContent = 'Server connection failed.';
        errorDiv.classList.remove('hidden');
    }
});
</script>
{% endblock %}
